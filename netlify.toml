[build]
  publish = "dist"
  command = "npm run build"

# Proxy API requests to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://eresumehub-backend.onrender.com/api/:splat"
  status = 200
  force = true

# React Router / Client-side routing catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
